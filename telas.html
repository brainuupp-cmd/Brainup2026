<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crie sua conta</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

  <div class="card shadow-lg border-0 rounded-4 p-4" style="max-width: 420px; width: 100%;">
    
    <div class="text-center mb-4">
      <h5 class="fw-bold mb-1">BrainUP</h5>
      <h4 class="fw-bold">Crie sua conta</h4>
      <p class="text-muted small">Comece sua jornada de aprendizado 🚀</p>
    </div>

    <form>
      <!-- Nome -->
      <div class="mb-3">
        <input type="text" class="form-control form-control-lg rounded-pill" placeholder="Nome completo">
      </div>

      <!-- Email -->
      <div class="mb-3">
        <input type="email" class="form-control form-control-lg rounded-pill" placeholder="E-mail">
      </div>

      <!-- Data -->
      <div class="mb-3">
        <input type="date" class="form-control form-control-lg rounded-pill">
      </div>

      <!-- Senha -->
      <div class="mb-3">
        <input type="password" class="form-control form-control-lg rounded-pill" placeholder="Senha">
      </div>

      <!-- Confirmar Senha -->
      <div class="mb-3">
        <input type="password" class="form-control form-control-lg rounded-pill" placeholder="Confirmar senha">
      </div>

      <!-- Área de estudo -->
      <div class="mb-3">
        <select class="form-select form-select-lg rounded-pill">
          <option selected disabled>Para que você deseja estudar?</option>
          <option>ENEM</option>
          <option>Vestibular</option>
          <option>Concurso</option>
          <option>Reforço escolar</option>
        </select>
      </div>

      <!-- Ano escolar -->
      <div class="mb-4">
        <select class="form-select form-select-lg rounded-pill">
          <option selected disabled>Qual ano do ensino médio está estudando?</option>
          <option>1º ano</option>
          <option>2º ano</option>
          <option>3º ano</option>
        </select>
      </div>

      <!-- Botão -->
      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-warning btn-lg rounded-pill fw-semibold">
          Cadastrar
        </button>
      </div>

      <!-- Login -->
      <div class="text-center">
        <small class="text-muted">
          Já tem conta?
          <a href="#" class="text-warning fw-semibold text-decoration-none">Entrar</a>
        </small>
      </div>
    </form>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
